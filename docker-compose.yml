services:
  app:
    build: .
    ports:
      - "${PORT:-8765}:8765"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - SQLITE_PATH=/app/data/interview_engine.db
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - BM25_INDEX_PATH=/app/data/bm25_index.json
    volumes:
      # 所有运行时数据集中到一个目录
      - ./data:/app/data
      # Embedding 模型缓存（避免每次重启重下 ~95MB）
      - hf_cache:/home/appuser/.cache/huggingface
    restart: unless-stopped

volumes:
  hf_cache:
