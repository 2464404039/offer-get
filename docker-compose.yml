version: '3.8'

services:
  # ── RAG API 服务 ──
  api:
    build: .
    ports:
      - "8765:8765"
    environment:
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      PORT: "8765"
      HOST: "0.0.0.0"
    volumes:
      - chroma_data:/app/chroma_db
      - sqlite_data:/app/rag_api.db  # 只持久化数据库文件，不覆盖 /app

volumes:
  chroma_data:
  sqlite_data:
