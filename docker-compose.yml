services:
  app:
    build: .
    ports:
      - "${PORT:-8765}:8765"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - SQLITE_PATH=/app/data/interview_engine.db
    volumes:
      # 持久化 ChromaDB 向量库
      - ./data/chroma_db:/app/chroma_db
      # 持久化 SQLite 数据库
      - ./data/sqlite:/app/data
      # 持久化 Embedding 模型缓存（避免每次重启重下 ~95MB）
      - ./data/hf_cache:/root/.cache/huggingface
    restart: unless-stopped
